<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Book pages -->
  <rect x="25" y="15" width="55" height="70" fill="#ffffff" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round" />
  <!-- Book spine (purple) -->
  <rect x="20" y="15" width="12" height="70" fill="#f4c2c2" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round" />
  <!-- Book cover (purple) -->
  <rect x="32" y="22" width="48" height="63" fill="#9b8bb4" stroke="#2c3e50" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Yellow circle -->
  <circle cx="56" cy="45" r="14" fill="#f9ca4f" stroke="#2c3e50" stroke-width="3" />
  <text x="56" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">$</text>
  
  <!-- Lines -->
  <line x1="42" y1="68" x2="70" y2="68" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
  <line x1="42" y1="76" x2="70" y2="76" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
  
  <!-- Bookmark -->
  <polygon points="73,15 85,15 85,35 79,30 73,35" fill="#ffffff" stroke="#2c3e50" stroke-width="3" stroke-linejoin="round" />
</svg>
